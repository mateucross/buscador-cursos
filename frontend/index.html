<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - Sua Plataforma de Cursos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importando a biblioteca de ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Cursos</span>
            </div>
            <div class="search-bar-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="filtroPesquisa" placeholder="Buscar por cursos, temas ou habilidades...">
            </div>
            <div class="user-profile">
                <img src="https://wwws.cnpq.br/cvlattesweb/pkg_util_img.show_foto?v_cod=K1595987Z3" alt="Foto do Usuário">
                <span>Mateus Cruz</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="toolbar">
            <h2>Cursos Disponíveis</h2>
            <button id="toggleView" title="Alternar Visualização">
                <i class="fas fa-th-large"></i>
            </button>
        </div>
        <div class="loading-spinner-container" style="display: none;">
            <div class="loading-spinner"></div>
        </div>
        <!-- A visualização padrão agora é em grade -->
        <div id="resultado" class="grid-view"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
