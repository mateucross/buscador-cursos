<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Curso - Cursos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Cabeçalho Padrão da Plataforma -->
    <header class="main-header">
        <div class="header-content container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Cursos</span>
            </div>
            <div class="user-profile">
                <img src="https://wwws.cnpq.br/cvlattesweb/pkg_util_img.show_foto?v_cod=K1595987Z3" alt="Foto do Usuário">
                <span>Mateus Cruz</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div id="loading-spinner" class="loading-spinner-container" style="display: flex;">
            <div class="loading-spinner"></div>
        </div>
        <!-- O conteúdo do curso será injetado aqui -->
        <div id="course-details" class="course-page-layout"></div>
    </main>

    <!-- Pop-ups -->
    <div id="rating-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closePopup('rating-popup-overlay'  )">×</span><h2><i class="fas fa-star"></i> Avaliar Curso</h2><div class="rating-stars"><input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label><input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label><input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label><input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label><input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label></div><button id="submit-rating-button" class="action-button primary">Enviar Avaliação</button><div id="rating-result" class="popup-result-area"></div></div></div>
    <div id="support-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closePopup('support-popup-overlay')">×</span><div id="support-content"></div></div></div>
    <div id="cancel-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closeCancelPopup()">×</span><div id="cancel-content"></div></div></div>
    <div id="track-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closePopup('track-popup-overlay')">×</span><div id="track-content"></div></div></div>
    <div id="update-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closePopup('update-popup-overlay')">×</span><div id="update-content"></div></div></div>
    <div id="status-popup-overlay" class="popup-overlay"><div class="popup-content"><span class="close-button" onclick="closePopup('status-popup-overlay')">×</span><div id="status-content"></div></div></div>

    <script src="status.js"></script>
</body>
</html>
